<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="stylingtcher.css">
</head>
<body>

<div class="container">

    <h1>Dashboard</h1>

    <div class="card">
        <h2>Book Appointment</h2>

        <input type="text" id="teacherName" placeholder="Teacher Name">
        <input type="date" id="date">
        <input type="time" id="time">
        <textarea id="message" placeholder="Purpose of appointment"></textarea>

        <button id="bookBtn">Book Appointment</button>
    </div>

    <div class="card">
        <h2>Your Appointments</h2>
        <div id="appointmentList">
            <!-- Appointments will appear here -->
        </div>
    </div>

    <button id="logoutBtn" class="logout">Logout</button>

</div>

<script type="module" src="firebasetcher.js"></script>
<script type="module" src="scriptfortcher.js"></script>

</body>
</html>
