<!DOCTYPE html>
<html>
<head>
    <title>Student-Teacher Booking</title>
    <link rel="stylesheet" href="stylingtcher.css">
</head>
<body>

<h1>Student-Teacher Booking App</h1>

<div class="box">
    <h2>Register</h2>
    <input type="text" id="regName" placeholder="Enter Name"><br><br>
    <input type="email" id="regEmail" placeholder="Enter Email"><br><br>
    <input type="password" id="regPassword" placeholder="Enter Password"><br><br>
    <button id="registerBtn">Register</button>
</div>

<div class="box">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Enter Email"><br><br>
    <input type="password" id="loginPassword" placeholder="Enter Password"><br><br>
    <button id="loginBtn">Login</button>
</div>

<script type="module" src="firebasetcher.js"></script>
<script type="module" src="scriptfortcher.js"></script>

</body>
</html>
